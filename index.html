<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>企业存储人格测试 | 你是哪种存储人？</title>
<style>
:root {
  --bg: #f5f3ef;
  --bg-card: #ffffff;
  --accent: #2563eb;
  --accent-light: #eff4ff;
  --text-1: #1a1a2e;
  --text-2: #555770;
  --text-3: #8b8da3;
  --border: #e5e5ea;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.container {
  max-width: 460px;
  margin: 0 auto;
  padding: 24px 20px;
  min-height: 100vh;
}
.page { display: none; }
.page.active { display: flex; flex-direction: column; }

/* LANDING */
.landing {
  align-items: center;
  justify-content: center;
  min-height: 85vh;
  text-align: center;
}
.landing-badge {
  width: 100px; height: 100px;
  border-radius: 28px;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 52px;
  margin-bottom: 28px;
  box-shadow: 0 12px 40px rgba(37,99,235,0.25);
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.landing h1 {
  font-size: 30px;
  font-weight: 800;
  line-height: 1.35;
  margin-bottom: 12px;
}
.landing .subtitle {
  font-size: 15px;
  color: var(--text-2);
  margin-bottom: 40px;
  line-height: 1.7;
}
.btn-start {
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  border: none;
  color: #fff;
  font-family: inherit;
  font-size: 17px;
  font-weight: 700;
  padding: 15px 52px;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 24px rgba(37,99,235,0.3);
}
.btn-start:active { transform: scale(0.96); }
.landing-footer {
  margin-top: 32px;
  font-size: 12px;
  color: var(--text-3);
}

/* QUIZ */
.quiz { padding-top: 8px; }
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.progress-bar {
  flex: 1; height: 6px;
  background: var(--border);
  border-radius: 6px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #2563eb, #7c3aed);
  border-radius: 6px;
  transition: width 0.4s ease;
}
.progress-text {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-3);
  white-space: nowrap;
  min-width: 55px;
  text-align: right;
}
.question-tag {
  display: inline-block;
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-light);
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 16px;
  align-self: flex-start;
}
.question-text {
  font-size: 20px;
  font-weight: 700;
  line-height: 1.55;
  margin-bottom: 24px;
}
.option {
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 15px;
  line-height: 1.65;
  color: var(--text-1);
}
.option:active { transform: scale(0.98); }
.option.selected {
  border-color: var(--accent);
  background: var(--accent-light);
}
.option-content {
  display: flex;
  align-items: flex-start;
  gap: 12px;
}
.option-letter {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--bg);
  font-size: 13px;
  font-weight: 700;
  color: var(--text-2);
  flex-shrink: 0;
}
.option.selected .option-letter {
  background: var(--accent);
  color: #fff;
}
.option-text { flex: 1; }

/* RESULT */
.result {
  align-items: center;
  padding-bottom: 60px;
}
.result-hero {
  width: 100%;
  border-radius: 20px;
  padding: 36px 24px 28px;
  text-align: center;
  margin-bottom: 20px;
  color: #fff;
}
.result-emoji { font-size: 60px; margin-bottom: 12px; }
.result-type-code {
  font-family: 'Courier New', 'SF Mono', monospace;
  font-size: 38px;
  font-weight: 700;
  letter-spacing: 6px;
  margin-bottom: 6px;
}
.result-name {
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 14px;
}
.result-tagline {
  font-size: 14px;
  line-height: 1.75;
  opacity: 0.88;
}

.dim-section {
  width: 100%;
  background: var(--bg-card);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.dim-row {
  display: flex;
  align-items: center;
  padding: 10px 0;
}
.dim-row + .dim-row { border-top: 1px solid var(--border); }
.dim-label {
  font-size: 12px;
  color: var(--text-2);
  width: 72px;
  flex-shrink: 0;
  text-align: center;
}
.dim-bar-wrap {
  flex: 1; height: 8px;
  background: #eee;
  border-radius: 8px;
  margin: 0 8px;
  overflow: hidden;
}
.dim-bar-fill {
  height: 100%;
  border-radius: 8px;
  transition: width 1s ease;
}
.dim-pct {
  font-size: 12px;
  color: var(--text-2);
  width: 72px;
  flex-shrink: 0;
  text-align: center;
}

.card {
  width: 100%;
  background: var(--bg-card);
  border-radius: 16px;
  padding: 22px 20px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 12px;
}
.card p {
  font-size: 14px;
  line-height: 1.8;
  color: var(--text-2);
}
.tag-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  list-style: none;
}
.tag-list li {
  font-size: 13px;
  padding: 6px 14px;
  border-radius: 20px;
  font-weight: 500;
}
.tag-good { background: #ecfdf5; color: #059669; }
.tag-bad { background: #fef2f2; color: #dc2626; }

.truth-card {
  width: 100%;
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: 16px;
  padding: 22px 20px;
  margin-bottom: 12px;
}
.truth-card .card-title { color: #92400e; }
.truth-card p {
  font-size: 14px;
  line-height: 1.8;
  color: #78350f;
}

.soul-card {
  width: 100%;
  border-radius: 16px;
  padding: 28px 20px;
  text-align: center;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #fafafa, #f0f0f5);
  border: 1px dashed var(--border);
}
.soul-emoji { font-size: 44px; margin-bottom: 8px; }
.soul-label { font-size: 12px; color: var(--text-3); margin-bottom: 4px; }
.soul-name { font-size: 17px; font-weight: 700; }

.btn-restart {
  background: var(--bg-card);
  border: 2px solid var(--border);
  color: var(--text-2);
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  padding: 13px 36px;
  border-radius: 50px;
  cursor: pointer;
}
.btn-restart:active { transform: scale(0.96); }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}
.anim { animation: fadeUp 0.45s ease forwards; }
.d1{animation-delay:.05s;opacity:0}
.d2{animation-delay:.12s;opacity:0}
.d3{animation-delay:.2s;opacity:0}
.d4{animation-delay:.28s;opacity:0}
.d5{animation-delay:.36s;opacity:0}
.d6{animation-delay:.44s;opacity:0}
.d7{animation-delay:.52s;opacity:0}
.d8{animation-delay:.6s;opacity:0}

.confetti-wrap {
  position:fixed;top:0;left:0;right:0;height:100vh;
  pointer-events:none;z-index:999;overflow:hidden;
}
.confetti {
  position:absolute;top:-12px;
  animation: fall 2.8s ease-in forwards;
}
@keyframes fall {
  0%{transform:translateY(0) rotate(0);opacity:1}
  100%{transform:translateY(100vh) rotate(600deg);opacity:0}
}
</style>
</head>
<body>

<div class="container">
  <div id="page-landing" class="page landing active">
    <div class="landing-badge">🗄️</div>
    <h1>你是哪种<br>存储人？</h1>
    <p class="subtitle">企业存储 16 型人格测试<br>16 道题，测出你的存储灵魂<br>含行业扎心真相，慎入</p>
    <button class="btn-start" onclick="startQuiz()">开始测试</button>
    <p class="landing-footer">答题约需 3 分钟 · 可能引起 PTSD</p>
  </div>

  <div id="page-quiz" class="page quiz">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <div class="progress-text" id="counter"></div>
    </div>
    <div class="question-tag" id="dimension"></div>
    <div class="question-text" id="question"></div>
    <div id="options"></div>
  </div>

  <div id="page-result" class="page result"></div>
</div>

<script>
const questions = [
  // === E/I 采购哲学 x4 ===
  {dim:'EI',dimLabel:'💰 采购哲学',text:'业务部门说"我们需要更快的存储"，你的第一步？',options:[
    {text:'拉最新旗舰产品清单，性能必须留余量，一步到位',score:'E'},
    {text:'先问清楚到底哪个业务慢了，搞不好调个参数就解决了',score:'I'}
  ]},
  {dim:'EI',dimLabel:'💰 采购哲学',text:'SSD 又涨价了，涨了 30%。你的采购计划怎么办？',options:[
    {text:'该买就买，等它降你业务等得起吗？',score:'E'},
    {text:'先用 HDD 顶一顶，NAND 颗粒这价格迟早会回来的',score:'I'}
  ]},
  {dim:'EI',dimLabel:'💰 采购哲学',text:'厂商销售年底冲业绩，给你一个"史上最低折扣"，但你目前不缺存储。',options:[
    {text:'买！这价格错过等一年。先囤着，早晚用得上',score:'E'},

  ]},
  {dim:'EI',dimLabel:'💰 采购哲学',text:'项目结项还剩一笔预算，你倾向？',options:[
    {text:'趁机升级一下硬件，机会难得',score:'E'},
    {text:'退回去，省下来的钱就是我的 KPI',score:'I'}

  // === S/N 介质信仰 x4 ===
  {dim:'SN',dimLabel:'⚡ 介质信仰',text:'老板问"我们的存储够不够先进"，你最想展示什么？',options:[
    {text:'全闪存阵列的 IOPS 数字——快就是正义',score:'S'},
    {text:'PB 级数据湖的总容量和成本曲线——能装才是本事',score:'N'}
  ]},
  {dim:'SN',dimLabel:'⚡ 介质信仰',text:'AI 团队突然找你：我们要 100PB 训练数据存储，下个月上线。',options:[
    {text:'全闪存 + 高速网络，AI 训练延迟高了等于烧 GPU 的钱',score:'S'},

  ]},
  {dim:'SN',dimLabel:'⚡ 介质信仰',text:'有人在存储群里说"磁带已死"，你的反应？',options:[

    {text:'说这话的人一定没算过 EB 级归档的 TCO',score:'N'}
  ]},
  {dim:'SN',dimLabel:'⚡ 介质信仰',text:'描述你心目中"漂亮的存储架构"：',options:[
    {text:'整齐的全闪存机柜，指示灯闪烁，安静高效',score:'S'},
    {text:'热温冷分层各得其所，该快的快该省的省',score:'N'}

  // === T/F 安全理念 x4 ===
  {dim:'TF',dimLabel:'🛡️ 安全理念',text:'隔壁公司被勒索软件攻击了，赎金 500 万美元。你的第一反应？',options:[
    {text:'连夜 review 自己的灾备方案，不可变快照有没有开？气隙隔离到位没？',score:'T'},
    {text:'看了看自己的每日备份脚本，嗯，应该没问题吧……然后继续刷手机',score:'F'}
  ]},
  {dim:'TF',dimLabel:'🛡️ 安全理念',text:'你的备份恢复演练频率？',options:[
    {text:'至少季度一次，不演练的灾备等于没有',score:'T'},
    {text:'上次演练是……去年？前年？反正备份一直在跑',score:'F'}
  ]},
  {dim:'TF',dimLabel:'🛡️ 安全理念',text:'凌晨 2 点收到告警：备份任务失败了。',options:[
    {text:'立刻起来查，备份窗口不等人，RPO 不能破',score:'T'},
    {text:'设了个早上 7 点的闹钟，偶尔失败一次正常，明天看日志',score:'F'}
  ]},
  {dim:'TF',dimLabel:'🛡️ 安全理念',text:'厂商 SE 在 POC 测试中偷偷把缓存比例调到 80% 跑出了漂亮数据。你发现了。',options:[

  // === J/P 架构哲学 x4 ===
  {dim:'JP',dimLabel:'🏗️ 架构哲学',text:'公司三个业务线分别想买不同品牌存储，你的立场？',options:[

    {text:'老板，他们业务跟我们完全不一样，别被 PPT 忽悠了',score:'P'}
  ]},
  {dim:'JP',dimLabel:'🏗️ 架构哲学',text:'你理想中的存储管理界面数量？',options:[

    {text:'五六个无所谓，各有所长，习惯了就好',score:'P'}

  {dim:'JP',dimLabel:'🏗️ 架构哲学',text:'开源存储方案（Ceph/MinIO）vs 商业存储，你更倾向？',options:[

    {text:'开源方案灵活自由，可控性强，贵的不一定好',score:'P'}
  ]}
];

  ESTJ:{emoji:'🏰',name:'闪存堡垒指挥官',g:'linear-gradient(135deg,#1e3a8a,#2563eb)',

    desc:'你是存储界的完美主义者加掌控狂。预算？那是用来花的。你的机房里全闪存阵列整整齐齐，避风港方案滴水不漏，管理界面统一得像强迫症患者的桌面。领导最爱你，因为你永远不出事；厂商最爱你，因为你永远买最贵的。',

    bad:['预算审批的噩梦','存储利用率感人','看到别人用 HDD 会生理不适'],

let cur=0,sc={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};

function startQuiz(){
  document.getElementById('page-landing').classList.remove('active');
  document.getElementById('page-quiz').classList.add('active');
  cur=0;sc={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  render();
}

function render(){
  const q=questions[cur];
  document.getElementById('progress').style.width=(cur/questions.length*100)+'%';
  document.getElementById('counter').textContent=(cur+1)+' / '+questions.length;
  document.getElementById('dimension').textContent=q.dimLabel;
  document.getElementById('question').textContent=q.text;
  const sh=[...q.options].sort(()=>Math.random()-0.5);
  document.getElementById('options').innerHTML=sh.map((o,i)=>`
    <div class="option" onclick="pick(this,'${o.score}')">
      <div class="option-content">
        <span class="option-letter">${String.fromCharCode(65+i)}</span>
        <span class="option-text">${o.text}</span>
      </div>
    </div>`).join('');
  const qe=document.getElementById('question');
  qe.style.animation='none';qe.offsetHeight;
  qe.style.animation='fadeUp 0.35s ease forwards';
}

function pick(el,s){
  document.querySelectorAll('.option').forEach(o=>o.style.pointerEvents='none');
  el.classList.add('selected');sc[s]++;
  setTimeout(()=>{cur++;cur<questions.length?render():showResult();},350);
}

function showResult(){
  const t=(sc.E>=sc.I?'E':'I')+(sc.S>=sc.N?'S':'N')+(sc.T>=sc.F?'T':'F')+(sc.J>=sc.P?'J':'P');
  const r=R[t];
  document.getElementById('page-quiz').classList.remove('active');
  const rp=document.getElementById('page-result');
  rp.classList.add('active');
  boom();

  const dims=[
    {l:'💰 豪横',r:'🧮 精算',ls:sc.E,rs:sc.I,c:'#2563eb'},
    {l:'⚡ 闪存',r:'📦 容量',ls:sc.S,rs:sc.N,c:'#e84393'},
    {l:'🏰 堡垒',r:'🧘 佛系',ls:sc.T,rs:sc.F,c:'#00b894'},
    {l:'📐 统一',r:'🧩 百花',ls:sc.J,rs:sc.P,c:'#f39c12'}
  ];

  rp.innerHTML=`
    <div class="result-hero anim" style="background:${r.g}">
      <div class="result-emoji">${r.emoji}</div>
      <div class="result-type-code">${t}</div>
      <div class="result-name">${r.name}</div>
      <div class="result-tagline">${r.tag}</div>
    </div>
    <div class="dim-section anim d1">
      ${dims.map(d=>{const tt=d.ls+d.rs,p=tt>0?Math.round(d.ls/tt*100):50;
        return`<div class="dim-row"><div class="dim-label">${d.l}</div><div class="dim-bar-wrap"><div class="dim-bar-fill" style="width:${p}%;background:${d.c}"></div></div><div class="dim-pct">${d.r}</div></div>`;}).join('')}
    </div>
    <div class="card anim d2"><div class="card-title">📝 性格描述</div><p>${r.desc}</p></div>
    <div class="truth-card anim d3"><div class="card-title">🔪 扎心真相</div><p>${r.truth}</p></div>
    <div class="card anim d4"><div class="card-title">💪 你的优势</div><ul class="tag-list">${r.good.map(s=>`<li class="tag-good">${s}</li>`).join('')}</ul></div>
    <div class="card anim d5"><div class="card-title">😅 你的软肋</div><ul class="tag-list">${r.bad.map(s=>`<li class="tag-bad">${s}</li>`).join('')}</ul></div>
    <div class="soul-card anim d6"><div class="soul-emoji">${r.se}</div><div class="soul-label">你的灵魂存储产品</div><div class="soul-name">${r.soul}</div></div>
    <button class="btn-restart anim d7" onclick="restart()">🔄 再测一次</button>`;
}

function restart(){
  document.getElementById('page-result').classList.remove('active');
  document.getElementById('page-result').innerHTML='';
  document.getElementById('page-landing').classList.add('active');
}

function boom(){
  const c=document.createElement('div');c.className='confetti-wrap';document.body.appendChild(c);
  const cl=['#2563eb','#e84393','#f39c12','#00b894','#7c3aed','#e17055'];
  for(let i=0;i<50;i++){const p=document.createElement('div');p.className='confetti';
    p.style.left=Math.random()*100+'%';p.style.width=(6+Math.random()*6)+'px';
    p.style.height=(6+Math.random()*6)+'px';p.style.background=cl[~~(Math.random()*cl.length)];
    p.style.borderRadius=Math.random()>.5?'50%':'2px';
    p.style.animationDelay=Math.random()*1.5+'s';
    p.style.animationDuration=(2+Math.random()*2)+'s';c.appendChild(p);}
  setTimeout(()=>c.remove(),4000);
}
